<!-- Modal Absence -->
<div class="overlay" id="absOverlay">
  <div class="modal">
    <div class="modal-h">
      <div><div class="modal-title" id="absMTitle">Saisir une absence</div><div class="modal-sub" id="absMSub"></div></div>
      <button class="modal-x" onclick="closeOverlay('absOverlay')">×</button>
    </div>
    <div class="form-g"><label class="form-l">Ressource</label><select class="form-c" id="absRsc"></select></div>
    <div class="form-g"><label class="form-l">Date</label><input type="date" class="form-c" id="absDate"></div>
    <div class="form-g"><label class="form-l">Type d'absence</label>
      <div class="type-grid">
        <div class="type-btn sel-conges" onclick="selAbsType('Congés',this)">🏖️ Congés</div>
        <div class="type-btn" onclick="selAbsType('Maladie',this)">🤒 Maladie</div>
      </div>
    </div>
    <div class="form-g"><label class="form-l">Heures</label><input type="number" class="form-c form-c-lg" id="absH" value="8" min="0.5" max="24" step="0.5" onkeydown="handleModalKey(event,'abs')"></div>
    <div class="modal-f">
      <button class="btn btn-outline" onclick="closeOverlay('absOverlay')">Annuler</button>
      <button class="btn btn-danger btn-sm" id="absDelBtn" onclick="deleteAbsence()" style="display:none">🗑️</button>
      <button class="btn btn-primary" onclick="saveAbsence()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal Hors Projet -->

<!-- Modal Projet -->
<div class="overlay" id="projOverlay">
  <div class="modal" style="width:520px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column">
    <div class="modal-h" style="flex-shrink:0">
      <div><div class="modal-title" id="projMTitle">Nouveau projet</div></div>
      <button class="modal-x" onclick="closeOverlay('projOverlay')">×</button>
    </div>
    <div style="overflow-y:auto;flex:1">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-g"><label class="form-l">N° Commande</label><input class="form-c" id="projCmd" placeholder="4500XXXXXX"></div>
        <div class="form-g"><label class="form-l">EOTP</label><input class="form-c" id="projEOTP" placeholder="Ex: 100.123456"></div>
        <div class="form-g"><label class="form-l">Nom du projet</label><input class="form-c" id="projNom" placeholder="Nom du projet"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-g"><label class="form-l">Type</label>
          <select class="form-c" id="projType"><option>LA</option><option>LS</option><option>Mixte</option><option>Autre</option></select>
        </div>
        <div class="form-g"><label class="form-l">Entité</label>
          <select class="form-c" id="projEnt"><option>Atlantique Etudes</option><option>Eqos Energie</option></select>
        </div>
        <div class="form-g"><label class="form-l">Statut</label>
          <select class="form-c" id="projStatut"><option>En cours</option><option>Offre</option><option>Non démarré</option><option>Stand-by</option><option>Terminé</option></select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-g"><label class="form-l">Responsable</label><input class="form-c" id="projResp"></div>
        <div class="form-g"><label class="form-l">Client</label><input class="form-c" id="projClient" placeholder="RTE CDI NANTES"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-g"><label class="form-l">Date de début</label><input type="date" class="form-c" id="projDate"></div>
        <div class="form-g"><label class="form-l">Date prévisionnelle travaux</label><input type="date" class="form-c" id="projDateTravaux"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-g"><label class="form-l">N° Lot</label>
          <select class="form-c" id="projLot">
            <option value="">— Non défini —</option>
            <option>Lot 1</option><option>Lot 2</option><option>Lot 3</option>
          </select>
        </div>
        <div class="form-g"><label class="form-l">Fiabilité de planification</label>
          <select class="form-c" id="projFiabilite">
            <option value="">— Non définie —</option>
            <option>K1 – Planification robuste</option>
            <option>K2 – Risque Stop&amp;Go</option>
            <option>K3 – Risque consistance variable</option>
          </select>
        </div>
      </div>
      <div class="form-g"><label class="form-l">Descriptif <span style="color:var(--grey-500);font-weight:400">(optionnel)</span></label>
        <textarea class="form-c" id="projDescriptif" rows="3" placeholder="Description, contexte, périmètre du projet..." style="resize:vertical;min-height:60px"></textarea>
      </div>
    </div>
    <div class="modal-f" style="flex-shrink:0">
      <button class="btn btn-outline" onclick="closeOverlay('projOverlay')">Annuler</button>
      <button class="btn btn-danger btn-sm" id="projDelBtn" onclick="deleteProj()" style="display:none">🗑️</button>
      <button class="btn btn-primary" onclick="saveProj()">✓ Enregistrer</button>
    </div>
  </div>
</div>
